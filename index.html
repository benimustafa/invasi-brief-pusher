<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invasi Brief Pusher</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0f0f0f;--surface:#1a1a1a;--surface2:#222;--border:#2e2e2e;
    --accent:#d4f542;--text:#f0f0f0;--text2:#888;--text3:#555;
    --success:#4ade80;--warning:#fbbf24;--danger:#f87171;--radius:10px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}

  .topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;border-bottom:1px solid var(--border);background:var(--surface);position:sticky;top:0;z-index:100;gap:12px;}
  .logo{font-family:'Space Mono',monospace;font-size:12px;font-weight:700;color:var(--accent);letter-spacing:.08em;white-space:nowrap;}
  .logo span{color:var(--text3);font-weight:400;}
  .main-tabs{display:flex;gap:4px;background:var(--bg);padding:4px;border-radius:8px;}
  .main-tab{padding:7px 14px;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;color:var(--text2);transition:all .15s;border:none;background:none;letter-spacing:.03em;font-family:'Syne',sans-serif;}
  .main-tab.active{background:var(--accent);color:#0f0f0f;}
  .main-tab:hover:not(.active){color:var(--text);background:var(--surface2);}
  .conn-status{display:flex;align-items:center;gap:7px;font-size:11px;color:var(--text2);white-space:nowrap;}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--text3);}
  .dot.ok{background:var(--success);box-shadow:0 0 6px var(--success);}
  .dot.err{background:var(--danger);}

  .panel{display:none;padding:24px;max-width:980px;margin:0 auto;}
  .panel.active{display:block;}

  /* BOARD TABS */
  .board-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px;}
  .board-tab{padding:6px 14px;border-radius:99px;font-size:11px;font-weight:700;cursor:pointer;border:1px solid var(--border);background:none;color:var(--text2);transition:all .15s;letter-spacing:.04em;font-family:'Syne',sans-serif;}
  .board-tab.active{background:var(--accent);color:#0f0f0f;border-color:var(--accent);}
  .board-tab:hover:not(.active){border-color:var(--text3);color:var(--text);}

  /* ASSIGNEE GROUP */
  .assignee-group{margin-bottom:28px;}
  .assignee-header{display:flex;align-items:center;gap:10px;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--border);}
  .assignee-avatar{width:32px;height:32px;border-radius:50%;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--accent);flex-shrink:0;}
  .assignee-name{font-size:14px;font-weight:700;}
  .assignee-summary{margin-left:auto;display:flex;gap:6px;flex-wrap:wrap;}
  .summary-pill{font-size:10px;font-weight:700;padding:3px 8px;border-radius:99px;letter-spacing:.04em;}
  .pill-danger{background:#f8717122;color:var(--danger);}
  .pill-warn{background:#fbbf2422;color:var(--warning);}
  .pill-ok{background:#4ade8022;color:var(--success);}

  .cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:10px;}

  /* TRELLO CARD */
  .tcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;transition:border-color .15s;}
  .tcard:hover{border-color:var(--text3);}
  .tcard-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:6px;}
  .tcard-title{font-size:12px;font-weight:700;line-height:1.4;flex:1;}
  .tcard-label{font-size:9px;font-weight:700;padding:2px 7px;border-radius:99px;white-space:nowrap;text-transform:uppercase;letter-spacing:.05em;flex-shrink:0;}
  .tcard-list{font-size:10px;color:var(--text3);margin-bottom:8px;}
  .dbadge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;padding:3px 9px;border-radius:99px;margin-bottom:10px;}
  .d-overdue{background:var(--danger);color:#fff;}
  .d-h1{background:#f8717133;color:var(--danger);}
  .d-h3{background:#fbbf2422;color:var(--warning);}
  .d-ok{background:#4ade8022;color:var(--success);}
  .stuck-warn{font-size:10px;color:var(--warning);margin-bottom:6px;}
  .tcard-actions{display:flex;gap:6px;}
  .btn-comment{flex:1;padding:7px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:7px;color:var(--text2);font-size:11px;font-weight:700;cursor:pointer;font-family:'Syne',sans-serif;transition:all .15s;}
  .btn-comment:hover{border-color:var(--accent);color:var(--accent);}
  .btn-open{padding:7px 10px;background:none;border:1px solid var(--border);border-radius:7px;color:var(--text3);font-size:11px;cursor:pointer;text-decoration:none;display:flex;align-items:center;transition:all .15s;}
  .btn-open:hover{border-color:var(--text3);color:var(--text);}

  /* PUSH FORM */
  .card-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:14px;}
  .sec-title{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);margin-bottom:12px;}
  .g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
  .field{display:flex;flex-direction:column;gap:5px;}
  label{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text2);}
  input,select,textarea{background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Syne',sans-serif;font-size:13px;padding:9px 12px;outline:none;transition:border-color .15s;width:100%;}
  input:focus,select:focus,textarea:focus{border-color:var(--accent);}
  textarea{resize:vertical;min-height:130px;line-height:1.6;font-size:12px;}
  select option{background:var(--surface2);}

  .checklist{display:flex;flex-direction:column;gap:7px;}
  .check-item{display:flex;align-items:center;gap:9px;padding:7px 11px;background:var(--surface2);border-radius:7px;border:1px solid var(--border);}
  .check-item input[type="checkbox"]{width:14px;height:14px;accent-color:var(--accent);cursor:pointer;flex-shrink:0;}
  .check-item input[type="text"]{background:transparent;border:none;padding:0;font-size:12px;flex:1;}
  .check-item input[type="text"]:focus{border:none;}
  .check-remove{background:none;border:none;color:var(--text3);cursor:pointer;font-size:15px;padding:0 3px;transition:color .15s;}
  .check-remove:hover{color:var(--danger);}
  .add-check{display:flex;align-items:center;gap:7px;padding:7px 11px;border:1px dashed var(--border);border-radius:7px;background:none;color:var(--text3);font-size:11px;cursor:pointer;font-family:'Syne',sans-serif;font-weight:700;width:100%;transition:all .15s;margin-top:8px;}
  .add-check:hover{border-color:var(--accent);color:var(--accent);}
  .btn-push{width:100%;padding:14px;background:var(--accent);color:#0f0f0f;border:none;border-radius:var(--radius);font-family:'Space Mono',monospace;font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:all .15s;margin-top:8px;}
  .btn-push:hover{background:#bfe03a;transform:translateY(-1px);}
  .btn-push:disabled{background:var(--text3);cursor:not-allowed;transform:none;}
  .btn-sec{padding:8px 16px;background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:7px;font-family:'Syne',sans-serif;font-size:11px;font-weight:700;cursor:pointer;transition:all .15s;}
  .btn-sec:hover{border-color:var(--accent);color:var(--accent);}

  /* SETTINGS */
  .s-group{margin-bottom:24px;}
  .s-label{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);margin-bottom:10px;padding-bottom:7px;border-bottom:1px solid var(--border);}
  .prev-label{font-size:10px;color:var(--text3);margin-bottom:5px;font-weight:700;letter-spacing:.06em;}
  .comment-preview{background:var(--surface2);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:8px;padding:10px 14px;font-size:12px;color:var(--text2);line-height:1.6;margin-bottom:10px;font-style:italic;}
  .mil-row{display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:7px;margin-bottom:7px;}
  .mil-num{font-size:11px;color:var(--text3);min-width:20px;}

  .empty-state{text-align:center;padding:50px 20px;color:var(--text3);}
  .empty-state .emoji{font-size:36px;margin-bottom:10px;}
  .empty-state p{font-size:13px;}

  #toast{position:fixed;bottom:20px;right:20px;padding:12px 18px;border-radius:var(--radius);font-size:12px;font-weight:700;opacity:0;transform:translateY(10px);transition:all .2s;z-index:9999;max-width:300px;line-height:1.5;}
  #toast.show{opacity:1;transform:translateY(0);}
  #toast.success{background:var(--success);color:#0f0f0f;}
  #toast.error{background:var(--danger);color:#fff;}
  #toast.info{background:var(--accent);color:#0f0f0f;}

  .spinner{display:inline-block;width:12px;height:12px;border:2px solid rgba(0,0,0,.3);border-top-color:#0f0f0f;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:5px;}
  @keyframes spin{to{transform:rotate(360deg);}}

  .monitor-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px;}

  @media(max-width:600px){
    .g2,.g3{grid-template-columns:1fr;}
    .panel{padding:14px;}
    .topbar{padding:10px 14px;flex-wrap:wrap;}
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">INVASI <span>/ Brief Pusher</span></div>
  <div class="main-tabs">
    <button class="main-tab active" onclick="showMain('push',this)">📋 Push Brief</button>
    <button class="main-tab" onclick="showMain('monitor',this)">📊 Monitor</button>
    <button class="main-tab" onclick="showMain('settings',this)">⚙️ Settings</button>
  </div>
  <div class="conn-status">
    <div class="dot" id="conn-dot"></div>
    <span id="conn-text">Connecting...</span>
  </div>
</div>

<!-- PUSH PANEL -->
<div class="panel active" id="panel-push">
  <div class="card-box">
    <div class="sec-title">Target Board &amp; Assignment</div>
    <div class="g3" style="margin-bottom:12px;">
      <div class="field"><label>Board</label><select id="board-select" onchange="loadLists()"><option value="">Loading...</option></select></div>
      <div class="field"><label>List / Stage</label><select id="list-select"><option value="">Pilih board dulu</option></select></div>
      <div class="field"><label>Assignee</label><select id="assignee-select"><option value="">Loading...</option></select></div>
    </div>
    <div class="g2">
      <div class="field"><label>Label</label><select id="label-select"><option value="">Tanpa label</option></select></div>
      <div class="field"><label>Deadline</label><input type="date" id="due-date"></div>
    </div>
  </div>

  <div class="card-box">
    <div class="sec-title">Brief Content</div>
    <div class="field" style="margin-bottom:12px;"><label>Card Title</label><input type="text" id="card-title" placeholder="e.g. FIFA Fan Art Pack - Devi"></div>
    <div class="field" style="margin-bottom:12px;"><label>Brief (paste dari Claude)</label><textarea id="brief-content" placeholder="Paste brief lengkap di sini..."></textarea></div>
    <div class="field"><label>Reference Link</label><input type="text" id="ref-link" placeholder="https://pinterest.com/..."></div>
  </div>

  <div class="card-box">
    <div class="sec-title">Milestone Checklist</div>
    <div class="checklist" id="checklist-container"></div>
    <button class="add-check" onclick="addCheckItem()">+ Tambah milestone</button>
  </div>

  <button class="btn-push" id="push-btn" onclick="pushToTrello()">🚀 Push to Trello</button>
</div>

<!-- MONITOR PANEL -->
<div class="panel" id="panel-monitor">
  <div class="monitor-bar">
    <div class="board-tabs" id="board-tabs">
      <button class="board-tab active" onclick="selectBoard(null,this)">Semua</button>
    </div>
    <button class="btn-sec" onclick="loadMonitor()">↻ Refresh</button>
  </div>
  <div id="monitor-content">
    <div class="empty-state"><div class="emoji">📡</div><p>Loading...</p></div>
  </div>
</div>

<!-- SETTINGS PANEL -->
<div class="panel" id="panel-settings">
  <div class="s-group">
    <div class="s-label">🔑 Trello Credentials</div>
    <div class="g2" style="margin-bottom:12px;">
      <div class="field"><label>API Key</label><input type="text" id="s-api-key" placeholder="Trello API Key"></div>
      <div class="field"><label>Token</label><input type="password" id="s-token" placeholder="Trello Token"></div>
    </div>
    <button class="btn-sec" onclick="saveCredentials()">💾 Simpan &amp; Connect</button>
  </div>

  <div class="s-group">
    <div class="s-label">🏷️ Default Milestones</div>
    <div id="default-milestones"></div>
    <button class="add-check" onclick="addDefaultMilestone()">+ Tambah milestone</button>
    <button class="btn-sec" style="margin-top:10px;" onclick="saveDefaults()">💾 Simpan</button>
  </div>

  <div class="s-group">
    <div class="s-label">💬 Comment Templates Preview</div>
    <div class="prev-label">OVERDUE</div><div class="comment-preview" id="prev-overdue"></div>
    <div class="prev-label">H-1</div><div class="comment-preview" id="prev-h1"></div>
    <div class="prev-label">H-3</div><div class="comment-preview" id="prev-h3"></div>
    <div class="prev-label">STUCK 2 HARI</div><div class="comment-preview" id="prev-stuck"></div>
    <div class="prev-label">DONE</div><div class="comment-preview" id="prev-done"></div>
    <button class="btn-sec" onclick="refreshPreviews()">↻ Preview lain</button>
  </div>
</div>

<div id="toast"></div>

<script>
const SAVED_KEY = 'invasi_bp_v3';
let cfg = JSON.parse(localStorage.getItem(SAVED_KEY) || '{}');
let API_KEY = cfg.apiKey || '';
let TOKEN = cfg.token || '';
let DEFAULT_MILESTONES = cfg.milestones || ['Sketsa konsep','Line art selesai','Coloring done','QC pass','Upload marketplace'];

const SKIP_LIST = ['done','published','archive','selesai','completed'];
function isSkipList(name) {
  const n = (name||'').toLowerCase();
  return SKIP_LIST.some(p => n.includes(p));
}

let allBoards = [];
let boardCache = {};
let currentBoardFilter = null;
window._cardMap = {};

// ---- COMMENT TEMPLATES ----
const TEMPLATES = {
  overdue: [
    "Ono kendala opo? Deadline wes kelewat, gaskeun ya biar bisa kelar 🙏",
    "Deadline-e udah lewat nih! Ono opo yang bikin nyangkut? Kabarin langsung 💪",
    "Wes telat iki! Progress-e piye saiki? Masih bisa dikejar, langsung gas 🔥",
    "Ojok diem ae, deadline kelewat! Ada blocker opo? Cerita dong biar bisa bantu 👋",
    "Aduh kelewat nih! Ono kendala opo? Jangan disimpen sendiri, gaskeun bareng 💬",
    "Expired deadlinenya! Piye kondisine? Langsung kabarin ya biar bisa diatasi 😟",
  ],
  h1: [
    "Sesok deadline e! Checklist-e wes berapa persen? Gaskeun biar tepat waktu 🚀",
    "Tinggal sehari nih! Piye, wes meh rampung? Kalau ada yang nyangkut langsung gaskeun 🔥",
    "H-1 iki! Ojo sampe kelewat — ono yang bisa dibantu? 💪",
    "Besok last day! Progress-e gimana? Ayo dihabisin sekarang 🎯",
    "Tinggal sehari! Wes hampir rampung opo durung? Langsung gas 🏃",
    "Sesok deadline! Checklist-e kurang opo ae? Kelar in sekarang ya 🔥",
  ],
  h3: [
    "Piye progressnya? Deadline tinggal 3 hari, santai tapi gaskeun ya 😄",
    "Update dong, wes sampe fase opo? H-3 nih, masih bisa dikejar 👀",
    "Brief-e wes jalan kan? Deadline 3 hari lagi, kabarin kalau ada yang bikin buntu 🙌",
    "Progress e piye? Tinggal 3 hari, ayo dirapiin biar H-1 tinggal polish 💯",
    "Wes mulai opo durung? Deadline 3 hari, langsung kabarin kalau ada kendala ya 📢",
    "H-3 nih! Checklist-e wes maju berapa? Update dong biar tau posisi e 👁️",
  ],
  stuck: [
    "2 hari kok sepi, ono kendala opo? Kabarin kalau ada yang nyangkut ya 🙏",
    "Lagi stuck opo? Udah 2 hari ga ada update, cerita dong 👋",
    "Ada yang bikin buntu? 2 hari ngga ada gerakan nih — langsung kabarin 😊",
    "2 hari ngga ada aktivitas nih — ono blocker opo? Gaskeun bareng kalau perlu 💬",
    "Lagi nunggu opo? Kalau ada yang nyangkut langsung bilang, jangan disimpen sendiri 🤝",
    "Kok adem ayem? Progress-e piye? Ada yang bisa dibantu ga? 👀",
  ],
  done: [
    "Mantap jiwa! GJ banget, kerja kerasnya keliatan hasilnya 🔥",
    "Sip sip! Komplit semua, next brief coming soon bestie 😎",
    "Top markotop! Istirahat dulu terus siap-siap buat brief berikutnya 🙌",
    "Gass! Done tepat waktu, iki sing dimaksud profesional 💯",
    "Yeay komplit! Hasilnya pasti kece, good job! 🎉",
    "Rampung! Keren banget, konsisten terus ya — next brief siap 🚀",
  ],
};

function getComment(type, username) {
  const pool = TEMPLATES[type] || TEMPLATES.h3;
  const msg = pool[Math.floor(Math.random() * pool.length)];
  return username ? '@' + username + ' ' + msg : msg;
}

// ---- TRELLO API ----
const BASE = 'https://api.trello.com/1';
async function trello(path, method, body) {
  method = method || 'GET';
  const sep = path.includes('?') ? '&' : '?';
  const url = BASE + path + sep + 'key=' + API_KEY + '&token=' + TOKEN;
  const opts = { method: method, headers: {'Content-Type':'application/json'} };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(url, opts);
  if (!res.ok) throw new Error('Trello ' + res.status);
  return res.json();
}

// ---- INIT ----
async function init() {
  document.getElementById('s-api-key').value = API_KEY;
  document.getElementById('s-token').value = TOKEN;
  loadDefaultMilestonesToSettings();
  refreshPreviews();

  const d = new Date(); d.setDate(d.getDate() + 7);
  document.getElementById('due-date').value = d.toISOString().split('T')[0];

  if (!API_KEY || !TOKEN) {
    setConn(false);
    toast('Masukkan API Key & Token di Settings dulu ya!', 'error');
    return;
  }

  try {
    allBoards = await trello('/members/me/boards?filter=open&fields=id,name');
    buildBoardTabs();
    populatePushBoards();
    setConn(true);
    loadMonitor();
  } catch(e) {
    setConn(false);
    toast('Gagal connect ke Trello. Cek credentials di Settings.', 'error');
  }
}

function setConn(ok) {
  document.getElementById('conn-dot').className = 'dot ' + (ok ? 'ok' : 'err');
  document.getElementById('conn-text').textContent = ok ? 'Connected' : 'Disconnected';
}

// ---- BOARD TABS ----
function buildBoardTabs() {
  const c = document.getElementById('board-tabs');
  c.innerHTML = '<button class="board-tab active" onclick="selectBoard(null,this)">Semua</button>';
  allBoards.forEach(function(b) {
    const btn = document.createElement('button');
    btn.className = 'board-tab';
    btn.textContent = b.name.replace(/invasi\s*/i,'').trim() || b.name;
    btn.onclick = function() { selectBoard(b.id, btn); };
    c.appendChild(btn);
  });
}

function selectBoard(boardId, el) {
  currentBoardFilter = boardId;
  document.querySelectorAll('.board-tab').forEach(function(t){ t.classList.remove('active'); });
  el.classList.add('active');
  renderFromCache();
}

// ---- MONITOR ----
async function loadMonitor() {
  const c = document.getElementById('monitor-content');
  c.innerHTML = '<div class="empty-state"><div class="emoji">⏳</div><p>Loading cards...</p></div>';
  window._cardMap = {};

  try {
    if (!allBoards.length) {
      allBoards = await trello('/members/me/boards?filter=open&fields=id,name');
      buildBoardTabs();
      populatePushBoards();
    }

    for (var i = 0; i < allBoards.length; i++) {
      const board = allBoards[i];
      try {
        const results = await Promise.all([
          trello('/boards/' + board.id + '/cards?filter=open&fields=id,name,due,dueComplete,idList,idMembers,labels,dateLastActivity&checklists=all'),
          trello('/boards/' + board.id + '/lists?fields=id,name'),
          trello('/boards/' + board.id + '/members?fields=id,username,fullName'),
        ]);
        const cards = results[0], lists = results[1], members = results[2];
        boardCache[board.id] = { lists: lists, members: members, boardName: board.name };

        cards.forEach(function(c) {
          const list = lists.find(function(l){ return l.id === c.idList; });
          if (list && isSkipList(list.name)) return;

          // Check checklist completion
          var totalItems = 0, doneItems = 0, lastItemDue = null;
          (c.checklists || []).forEach(function(cl) {
            (cl.checkItems || []).forEach(function(item) {
              totalItems++;
              if (item.state === 'complete') doneItems++;
              // Track last checklist item due date for cards without card-level due date
              if (item.due) {
                var d = new Date(item.due);
                if (!lastItemDue || d > lastItemDue) lastItemDue = d;
              }
            });
          });

          // Skip if checklist 100% complete
          if (totalItems > 0 && doneItems === totalItems) return;

          // Skip if no due date AND no checklist items with due date
          var effectiveDue = c.due || (lastItemDue ? lastItemDue.toISOString() : null);
          if (!effectiveDue) return;

          window._cardMap[c.id] = Object.assign({}, c, {
            boardId: board.id,
            boardName: board.name,
            listName: list ? list.name : '—',
            memberObjs: c.idMembers.map(function(mid){ return members.find(function(m){ return m.id === mid; }); }).filter(Boolean),
            due: effectiveDue,
            checklistTotal: totalItems,
            checklistDone: doneItems,
          });
        });
      } catch(err) {}
    }
    renderFromCache();
  } catch(e) {
    c.innerHTML = '<div class="empty-state"><div class="emoji">⚠️</div><p>Gagal load: ' + e.message + '</p></div>';
  }
}

function renderFromCache() {
  const container = document.getElementById('monitor-content');
  const now = new Date();

  let cards = Object.values(window._cardMap);
  if (currentBoardFilter) cards = cards.filter(function(c){ return c.boardId === currentBoardFilter; });

  if (!cards.length) {
    container.innerHTML = '<div class="empty-state"><div class="emoji">✅</div><p>Tidak ada card aktif dengan deadline. Tim lagi aman nih!</p></div>';
    return;
  }

  cards = cards.map(function(c) {
    const due = new Date(c.due);
    const daysLeft = Math.ceil((due - now) / 86400000);
    const lastAct = c.dateLastActivity ? new Date(c.dateLastActivity) : null;
    const daysSince = lastAct ? Math.floor((now - lastAct) / 86400000) : null;
    let priority = daysLeft < 0 ? 0 : daysLeft <= 1 ? 1 : daysLeft <= 3 ? 2 : 3;
    return Object.assign({}, c, { daysLeft: daysLeft, daysSince: daysSince, priority: priority });
  });

  // Group by assignee
  const byAssignee = {};
  const unassigned = [];
  cards.forEach(function(c) {
    if (!c.memberObjs || !c.memberObjs.length) {
      unassigned.push(c);
    } else {
      c.memberObjs.forEach(function(m) {
        if (!byAssignee[m.id]) byAssignee[m.id] = { member: m, cards: [] };
        byAssignee[m.id].cards.push(c);
      });
    }
  });

  // Sort cards within each group by priority then daysLeft
  Object.values(byAssignee).forEach(function(g) {
    g.cards.sort(function(a,b){ return a.priority - b.priority || a.daysLeft - b.daysLeft; });
  });

  // Sort groups: most urgent person first
  const groups = Object.values(byAssignee).sort(function(a,b) {
    return Math.min.apply(null, a.cards.map(function(c){return c.priority;})) -
           Math.min.apply(null, b.cards.map(function(c){return c.priority;}));
  });

  let html = '';
  groups.forEach(function(g) {
    const overdueN = g.cards.filter(function(c){ return c.daysLeft < 0; }).length;
    const warnN = g.cards.filter(function(c){ return c.daysLeft >= 0 && c.daysLeft <= 3; }).length;
    const okN = g.cards.filter(function(c){ return c.daysLeft > 3; }).length;
    const name = g.member.fullName || g.member.username;
    const initials = name.split(' ').map(function(w){return w[0]||'';}).join('').toUpperCase().slice(0,2);

    html += '<div class="assignee-group">'
      + '<div class="assignee-header">'
      + '<div class="assignee-avatar">' + initials + '</div>'
      + '<div class="assignee-name">' + name + '</div>'
      + '<div class="assignee-summary">'
      + (overdueN ? '<span class="summary-pill pill-danger">🔴 ' + overdueN + ' overdue</span>' : '')
      + (warnN ? '<span class="summary-pill pill-warn">⚠️ ' + warnN + ' mepet</span>' : '')
      + (okN ? '<span class="summary-pill pill-ok">✅ ' + okN + ' aman</span>' : '')
      + '</div></div>'
      + '<div class="cards-grid">'
      + g.cards.map(renderCard).join('')
      + '</div></div>';
  });

  if (unassigned.length) {
    html += '<div class="assignee-group">'
      + '<div class="assignee-header"><div class="assignee-avatar" style="color:var(--text3)">?</div>'
      + '<div class="assignee-name" style="color:var(--text2)">Unassigned</div></div>'
      + '<div class="cards-grid">' + unassigned.map(renderCard).join('') + '</div></div>';
  }

  container.innerHTML = html;
}

function renderCard(card) {
  const dl = card.daysLeft;
  const done = card.dueComplete;
  let bc, bt;
  if (done) { bc = 'd-ok'; bt = '✅ Done'; }
  else if (dl < 0) { bc = 'd-overdue'; bt = '⚠️ Telat ' + Math.abs(dl) + ' hari'; }
  else if (dl <= 1) { bc = 'd-h1'; bt = '🔥 H-' + dl; }
  else if (dl <= 3) { bc = 'd-h3'; bt = '⏰ H-' + dl; }
  else { bc = 'd-ok'; bt = '📅 ' + dl + ' hari'; }

  const label = card.labels && card.labels[0];
  const ls = label && label.color ? 'background:' + getLabelColor(label.color) + '22;color:' + getLabelColor(label.color) + ';' : 'background:var(--surface2);color:var(--text2);';
  const stuck = card.daysSince >= 2 && !done ? '<div class="stuck-warn">⚠️ Tidak ada aktivitas ' + card.daysSince + ' hari</div>' : '';

  // Checklist progress
  var totalItems = 0, doneItems = 0, urgentMilestone = '';
  var now2 = new Date();
  (card.checklists || []).forEach(function(cl) {
    (cl.checkItems || []).forEach(function(item) {
      totalItems++;
      if (item.state === 'complete') { doneItems++; return; }
      if (!item.due) return;
      var iDaysLeft = Math.ceil((new Date(item.due) - now2) / 86400000);
      if (!urgentMilestone && iDaysLeft <= 1) {
        urgentMilestone = '<div class="stuck-warn" style="color:var(--danger);">🎯 ' + item.name + (iDaysLeft < 0 ? ' (telat ' + Math.abs(iDaysLeft) + 'h)' : ' (besok!)') + '</div>';
      } else if (!urgentMilestone && iDaysLeft <= 3) {
        urgentMilestone = '<div class="stuck-warn" style="color:var(--warning);">🎯 ' + item.name + ' (H-' + iDaysLeft + ')</div>';
      }
    });
  });
  var checklistBar = totalItems > 0 ? (function() {
    var pct = Math.round((doneItems / totalItems) * 100);
    var barColor = pct === 100 ? 'var(--success)' : pct >= 50 ? 'var(--warning)' : 'var(--danger)';
    return '<div style="display:flex;align-items:center;gap:6px;margin-bottom:8px;">'
      + '<div style="flex:1;height:3px;background:var(--border);border-radius:99px;overflow:hidden;">'
      + '<div style="width:' + pct + '%;height:100%;background:' + barColor + ';border-radius:99px;"></div></div>'
      + '<span style="font-size:10px;color:var(--text3);white-space:nowrap;">' + doneItems + '/' + totalItems + '</span></div>';
  })() : '';

  return '<div class="tcard">'
    + '<div class="tcard-top"><div class="tcard-title">' + card.name + '</div>'
    + (label && label.name ? '<span class="tcard-label" style="' + ls + '">' + label.name + '</span>' : '')
    + '</div>'
    + stuck
    + urgentMilestone
    + checklistBar
    + '<div class="tcard-list">' + card.listName + ' · ' + card.boardName + '</div>'
    + '<span class="dbadge ' + bc + '">' + bt + '</span>'
    + '<div class="tcard-actions">'
    + '<button class="btn-comment" onclick="sendComment(\'' + card.id + '\')">💬 Comment</button>'
    + '<a href="https://trello.com/c/' + card.id + '" target="_blank" class="btn-open">🔗</a>'
    + '</div></div>';
}

// ---- AUTO COMMENT ----
async function sendComment(cardId) {
  const card = window._cardMap[cardId];
  if (!card) return toast('Card tidak ditemukan, refresh dulu.', 'error');

  const now = new Date();
  const due = card.due ? new Date(card.due) : null;
  const daysLeft = due ? Math.ceil((due - now) / 86400000) : null;
  const lastAct = card.dateLastActivity ? new Date(card.dateLastActivity) : null;
  const daysSince = lastAct ? Math.floor((now - lastAct) / 86400000) : null;
  const done = card.dueComplete;

  // Mention semua member di card
  const usernames = card.memberObjs ? card.memberObjs.map(function(m){ return m.username; }).filter(Boolean) : [];
  const mention = usernames.map(function(u){ return '@' + u; }).join(' ');

  // Fetch checklist items untuk card ini
  let urgentItems = [];
  let overdueItems = [];
  try {
    const checklists = await trello('/cards/' + cardId + '/checklists');
    checklists.forEach(function(cl) {
      (cl.checkItems || []).forEach(function(item) {
        if (item.state === 'complete') return; // skip done items
        if (!item.due) return; // skip no due date
        const itemDue = new Date(item.due);
        const itemDaysLeft = Math.ceil((itemDue - now) / 86400000);
        if (itemDaysLeft < 0) {
          overdueItems.push({ name: item.name, daysLeft: itemDaysLeft });
        } else if (itemDaysLeft <= 3) {
          urgentItems.push({ name: item.name, daysLeft: itemDaysLeft });
        }
      });
    });
  } catch(e) {}

  // Build comment based on checklist + card due date
  let comment = '';
  const hasChecklistContext = overdueItems.length > 0 || urgentItems.length > 0;

  if (done) {
    comment = mention + ' ' + getComment('done', null);
  } else if (hasChecklistContext) {
    // Build milestone-aware comment
    let milestoneLines = [];
    overdueItems.forEach(function(i) {
      milestoneLines.push('- ' + i.name + ' → telat ' + Math.abs(i.daysLeft) + ' hari! ⚠️');
    });
    urgentItems.forEach(function(i) {
      var label = i.daysLeft === 0 ? 'hari ini!' : i.daysLeft === 1 ? 'besok!' : i.daysLeft + ' hari lagi';
      milestoneLines.push('- ' + i.name + ' → ' + label + ' ⏰');
    });

    var opener = overdueItems.length > 0
      ? getOpenersOverdue()
      : getOpenersUrgent();

    var closer = getCloser();
    comment = mention + '\n' + opener + '\n' + milestoneLines.join('\n') + '\n\n' + closer;
  } else if (daysLeft !== null && daysSince !== null && daysSince >= 2) {
    comment = mention + ' ' + getComment('stuck', null);
  } else if (daysLeft !== null && daysLeft < 0) {
    comment = mention + ' ' + getComment('overdue', null);
  } else if (daysLeft !== null && daysLeft <= 1) {
    comment = mention + ' ' + getComment('h1', null);
  } else {
    comment = mention + ' ' + getComment('h3', null);
  }

  const confirmed = confirm('Kirim komentar ini?\n\n' + comment + '\n\nKlik OK untuk kirim.');
  if (!confirmed) return;

  try {
    await trello('/cards/' + cardId + '/actions/comments', 'POST', { text: comment });
    toast('💬 Komentar terkirim!', 'success');
  } catch(e) {
    toast('Gagal kirim: ' + e.message, 'error');
  }
}

// Opener variations for milestone-aware comments
function getOpenersOverdue() {
  var pool = [
    'Ada milestone yang kelewat nih!',
    'Beberapa bagian udah telat!',
    'Milestone kelewat, ayo dikejar!',
  ];
  return pool[Math.floor(Math.random() * pool.length)];
}
function getOpenersUrgent() {
  var pool = [
    'Deadline milestone deket nih!',
    'Beberapa bagian mepet banget!',
    'Milestone mau deadline, gaskeun!',
  ];
  return pool[Math.floor(Math.random() * pool.length)];
}
function getCloser() {
  var pool = [
    'Ono kendala opo? Gaskeun biar timeline ga geser 🔥',
    'Ada yang nyangkut? Langsung kabarin ya 🙏',
    'Progress e piye? Kabarin kalau butuh bantuan 💪',
    'Wes jalan kan? Gaskeun ojo sampe kelewat 💯',
  ];
  return pool[Math.floor(Math.random() * pool.length)];
}

// ---- PUSH BRIEF ----
function populatePushBoards() {
  const sel = document.getElementById('board-select');
  sel.innerHTML = '<option value="">Pilih board...</option>' +
    allBoards.map(function(b){ return '<option value="' + b.id + '">' + b.name + '</option>'; }).join('');
}

async function loadLists() {
  const boardId = document.getElementById('board-select').value;
  if (!boardId) return;
  document.getElementById('list-select').innerHTML = '<option>Loading...</option>';

  try {
    let bc = boardCache[boardId];
    if (!bc) {
      const results = await Promise.all([
        trello('/boards/' + boardId + '/lists?filter=open'),
        trello('/boards/' + boardId + '/members'),
        trello('/boards/' + boardId + '/labels'),
      ]);
      bc = { lists: results[0], members: results[1], labels: results[2] };
      boardCache[boardId] = bc;
    }

    const filteredLists = (bc.lists||[]).filter(function(l){ return !isSkipList(l.name); });
    document.getElementById('list-select').innerHTML = '<option value="">Pilih list...</option>' +
      filteredLists.map(function(l){ return '<option value="' + l.id + '">' + l.name + '</option>'; }).join('');

    document.getElementById('assignee-select').innerHTML = '<option value="">Tanpa assignee</option>' +
      (bc.members||[]).map(function(m){ return '<option value="' + m.id + '">' + (m.fullName||m.username) + '</option>'; }).join('');

    document.getElementById('label-select').innerHTML = '<option value="">Tanpa label</option>' +
      (bc.labels||[]).filter(function(l){return l.name;}).map(function(l){ return '<option value="' + l.id + '">' + l.name + '</option>'; }).join('');
  } catch(e) { toast('Gagal load board data.', 'error'); }
}

async function pushToTrello() {
  const listId = document.getElementById('list-select').value;
  const title = document.getElementById('card-title').value.trim();
  const brief = document.getElementById('brief-content').value.trim();
  const refLink = document.getElementById('ref-link').value.trim();
  const dueDate = document.getElementById('due-date').value;
  const assigneeId = document.getElementById('assignee-select').value;
  const labelId = document.getElementById('label-select').value;

  if (!listId) return toast('Pilih board & list dulu!', 'error');
  if (!title) return toast('Card title kosong!', 'error');

  const btn = document.getElementById('push-btn');
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>Pushing...';

  try {
    let desc = brief;
    if (refLink) desc += '\n\n---\n**Reference:** ' + refLink;

    const cardBody = { name: title, desc: desc, idList: listId };
    if (dueDate) cardBody.due = new Date(dueDate).toISOString();
    if (assigneeId) cardBody.idMembers = [assigneeId];
    if (labelId) cardBody.idLabels = [labelId];

    const card = await trello('/cards', 'POST', cardBody);

    const items = Array.from(document.querySelectorAll('#checklist-container .check-item input[type="text"]'))
      .map(function(i){ return i.value.trim(); }).filter(Boolean);

    if (items.length) {
      const cl = await trello('/checklists', 'POST', { idCard: card.id, name: 'Milestone' });
      for (var i = 0; i < items.length; i++) {
        await trello('/checklists/' + cl.id + '/checkItems', 'POST', { name: items[i] });
      }
    }

    toast('Card "' + title + '" berhasil dipush! ✅', 'success');
    document.getElementById('card-title').value = '';
    document.getElementById('brief-content').value = '';
    document.getElementById('ref-link').value = '';
    loadDefaultChecklistToForm();
  } catch(e) { toast('Gagal push: ' + e.message, 'error'); }

  btn.disabled = false; btn.innerHTML = '🚀 Push to Trello';
}

// ---- CHECKLIST ----
function loadDefaultChecklistToForm() {
  const c = document.getElementById('checklist-container');
  c.innerHTML = '';
  DEFAULT_MILESTONES.forEach(function(m){ addCheckItem(m); });
}

function addCheckItem(text) {
  text = text || '';
  const c = document.getElementById('checklist-container');
  const d = document.createElement('div');
  d.className = 'check-item';
  d.innerHTML = '<input type="checkbox" disabled><input type="text" value="' + text + '" placeholder="Nama milestone..."><button class="check-remove" onclick="this.parentElement.remove()">x</button>';
  c.appendChild(d);
}

// ---- SETTINGS ----
function loadDefaultMilestonesToSettings() {
  const c = document.getElementById('default-milestones');
  c.innerHTML = '';
  DEFAULT_MILESTONES.forEach(function(m, i) {
    const d = document.createElement('div');
    d.className = 'mil-row';
    d.innerHTML = '<span class="mil-num">' + (i+1) + '.</span><input type="text" value="' + m + '"><button class="check-remove" onclick="this.parentElement.remove()">x</button>';
    c.appendChild(d);
  });
  loadDefaultChecklistToForm();
}

function addDefaultMilestone() {
  const c = document.getElementById('default-milestones');
  const n = c.children.length + 1;
  const d = document.createElement('div');
  d.className = 'mil-row';
  d.innerHTML = '<span class="mil-num">' + n + '.</span><input type="text" placeholder="Nama milestone..."><button class="check-remove" onclick="this.parentElement.remove()">x</button>';
  c.appendChild(d);
}

function saveDefaults() {
  DEFAULT_MILESTONES = Array.from(document.querySelectorAll('#default-milestones input[type="text"]'))
    .map(function(i){ return i.value.trim(); }).filter(Boolean);
  cfg.milestones = DEFAULT_MILESTONES;
  localStorage.setItem(SAVED_KEY, JSON.stringify(cfg));
  loadDefaultChecklistToForm();
  toast('Default milestones tersimpan!', 'success');
}

function saveCredentials() {
  API_KEY = document.getElementById('s-api-key').value.trim();
  TOKEN = document.getElementById('s-token').value.trim();
  cfg.apiKey = API_KEY; cfg.token = TOKEN;
  localStorage.setItem(SAVED_KEY, JSON.stringify(cfg));
  toast('Credentials tersimpan! Reconnecting...', 'info');
  setTimeout(init, 500);
}

function refreshPreviews() {
  ['overdue','h1','h3','stuck','done'].forEach(function(t) {
    const el = document.getElementById('prev-' + t);
    if (el) el.textContent = getComment(t, 'namadesigner');
  });
}

function getLabelColor(c) {
  const m = {green:'#4ade80',yellow:'#fbbf24',orange:'#fb923c',red:'#f87171',purple:'#c084fc',blue:'#60a5fa',sky:'#38bdf8',lime:'#a3e635',pink:'#f472b6',black:'#6b7280'};
  return m[c] || '#888';
}

function showMain(name, el) {
  document.querySelectorAll('.panel').forEach(function(p){ p.classList.remove('active'); });
  document.querySelectorAll('.main-tab').forEach(function(t){ t.classList.remove('active'); });
  document.getElementById('panel-' + name).classList.add('active');
  el.classList.add('active');
  if (name === 'monitor') loadMonitor();
}

var toastT;
function toast(msg, type) {
  type = type || 'info';
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = 'show ' + type;
  clearTimeout(toastT); toastT = setTimeout(function(){ el.className = ''; }, 3500);
}

init();
</script>
